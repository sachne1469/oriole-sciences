   SHARED: LOGO SVG
   ══════════════════════════════════════════════ */
function OrioleLogo({ size = 56, textColor = "#E8E7E3", goldColor = "#C9A24A" }) {
  // Dot ring — approximate the brand spiral
  const cx = size / 2, cy = size / 2, r = size * 0.38;
  const dots = [];
  const count = 36;
  // Color stops around the ring: sage → blackberry → gold → gold → sage
  const colorStops = [
    { a: 0,   c: "#C9A24A", s: 0.95 }, // gold right
    { a: 45,  c: "#d4a94e", s: 0.85 },
    { a: 90,  c: "#C9A24A", s: 1.0  }, // gold top
    { a: 120, c: "#b89040", s: 0.8  },
    { a: 150, c: "#8a7040", s: 0.65 },
    { a: 180, c: "#4F695B", s: 0.85 }, // sage left
    { a: 210, c: "#4F695B", s: 0.75 },
    { a: 240, c: "#3E2331", s: 0.9  }, // blackberry
    { a: 270, c: "#4a2a3a", s: 0.7  },
    { a: 300, c: "#3E2331", s: 0.8  },
    { a: 330, c: "#6b4a28", s: 0.75 },
    { a: 360, c: "#C9A24A", s: 0.95 },
  ];

  function lerpColor(a, b, t) {
    const hr = (h) => parseInt(h.slice(1,3),16);
    const hg = (h) => parseInt(h.slice(3,5),16);
    const hb = (h) => parseInt(h.slice(5,7),16);
    const r = Math.round(hr(a) + (hr(b)-hr(a))*t);
    const g = Math.round(hg(a) + (hg(b)-hg(a))*t);
    const bv = Math.round(hb(a) + (hb(b)-hb(a))*t);
    return `rgb(${r},${g},${bv})`;
  }
  function getColorAtAngle(deg) {
    for (let i = 0; i < colorStops.length-1; i++) {
      if (deg >= colorStops[i].a && deg < colorStops[i+1].a) {
        const t = (deg - colorStops[i].a) / (colorStops[i+1].a - colorStops[i].a);
        return { c: lerpColor(colorStops[i].c, colorStops[i+1].c, t), s: colorStops[i].s + (colorStops[i+1].s - colorStops[i].s)*t };
      }
    }
    return { c: colorStops[0].c, s: colorStops[0].s };
  }

  for (let i = 0; i < count; i++) {
    const angleDeg = (i / count) * 360;
    const angleRad = (angleDeg - 90) * Math.PI / 180;
    const { c, s } = getColorAtAngle(angleDeg);
    const dotR = size * 0.032 * (0.7 + 0.6 * s);
    dots.push(
      <circle
        key={i}
        cx={cx + r * Math.cos(angleRad)}
        cy={cy + r * Math.sin(angleRad)}
        r={dotR}
        fill={c}
        opacity={0.5 + 0.5 * s}
      />
    );
  }

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      {dots}
    </svg>
  );
}

function OtextLogo({ color = "#E8E7E3", gold = "#C9A24A", size = "lg" }) {

}
